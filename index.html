        // Database functions
        async function createEvent(eventName, creatorName) {
            const code = generateCode();

            // Create event
            const { data: event, error: eventError } = await supabase
                .from('events')
                .insert({ name: eventName, code })
                .select()
                .single();

            if (eventError) throw eventError;

            // Find creator's color from dummy people, or use default
            const creatorPerson = dummyPeople.find(p => p.name.toLowerCase() === creatorName.toLowerCase());
            const creatorColor = creatorPerson?.color || defaultColors[0];

            // Add creator as first participant
            const { data: participant, error: partError } = await supabase
                .from('participants')
                .insert({ event_id: event.id, name: creatorName, color: creatorColor })
                .select()
                .single();

            if (partError) throw partError;

            // Add dummy participants (excluding creator if they match)
            const otherPeople = dummyPeople.filter(p => p.name.toLowerCase() !== creatorName.toLowerCase());
            if (otherPeople.length > 0) {
                await supabase
                    .from('participants')
                    .insert(otherPeople.map(p => ({ event_id: event.id, name: p.name, color: p.color })));
            }

            return { event, participant };
        }

        async function joinEvent(code, name) {
            // Find event by code
            const { data: event, error: eventError } = await supabase
                .from('events')
                .select()
                .eq('code', code.toUpperCase())
                .single();

            if (eventError || !event) throw new Error('Event not found');

            // Check if participant already exists
            const { data: existing } = await supabase
                .from('participants')
                .select()
                .eq('event_id', event.id)
                .eq('name', name)
                .single();

            if (existing) {
                return { event, participant: existing };
            }

            // Get participant count for color
            const { count } = await supabase
                .from('participants')
                .select('*', { count: 'exact', head: true })
                .eq('event_id', event.id);

            const color = defaultColors[count % defaultColors.length];

            // Add new participant
            const { data: participant, error: partError } = await supabase
                .from('participants')
                .insert({ event_id: event.id, name, color })
                .select()
                .single();

            if (partError) throw partError;

            return { event, participant };
        }

        async function loadEventData() {
            // Load participants
            const { data: participants } = await supabase
                .from('participants')
                .select()
                .eq('event_id', state.eventId);

            state.participants = participants || [];

            // Load tracker counts
            const { data: logs } = await supabase
                .from('tracker_logs')
                .select('*, participants(name)')
                .eq('event_id', state.eventId);

            // Reset counts
            state.trackerCounts = { drinks: {}, shots: {}, fines: {}, photos: {} };

            if (logs) {
                logs.forEach(log => {
                    const name = log.participants?.name;
                    if (name && state.trackerCounts[log.tracker_type]) {
                        state.trackerCounts[log.tracker_type][name] = (state.trackerCounts[log.tracker_type][name] || 0) + 1;
                    }
                });

                // Build feed from recent logs
                state.feedItems = logs
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 10)
                    .map(log => ({
                        person: log.participants?.name,
                        action: `added a ${log.tracker_type.slice(0, -1)}`,
                        emoji: trackers.find(t => t.id === log.tracker_type)?.emoji || '',
                        time: timeAgo(new Date(log.created_at))
                    }));
            }

            // Load messages
            const { data: messages } = await supabase
                .from('messages')
                .select('*, participants(name)')
                .eq('event_id', state.eventId)
                .order('created_at', { ascending: true });

            state.messages = (messages || []).map(m => ({
                id: m.id,
                name: m.participants?.name,
                text: m.content,
                time: new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                own: m.participant_id === state.myParticipantId
            }));
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} min ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        async function incrementTracker(trackerId) {
            // Update local state immediately for responsiveness
            if (!state.trackerCounts[trackerId]) state.trackerCounts[trackerId] = {};
            state.trackerCounts[trackerId][state.myName] = (state.trackerCounts[trackerId][state.myName] || 0) + 1;

            // Update just the counter element (avoid full re-render which causes image flash)
            const counterEl = document.getElementById(`tracker-count-${trackerId}`);
            if (counterEl) {
                counterEl.textContent = state.trackerCounts[trackerId][state.myName];
                counterEl.style.transform = 'scale(1.3)';
                setTimeout(() => counterEl.style.transform = 'scale(1)', 150);
            }

            // Update leader section if this is drinks
            if (trackerId === 'drinks') {
                updateLeaderSection();
            }

            showToast(`+1 ${trackers.find(t => t.id === trackerId)?.emoji || ''}`);

            // Sync to Firebase
            syncTrackerIncrement(trackerId, state.myName);

            // Save to database if connected
            if (supabase && state.eventId && state.myParticipantId) {
                try {
                    await supabase
                        .from('tracker_logs')
                        .insert({
                            event_id: state.eventId,
                            participant_id: state.myParticipantId,
                            tracker_type: trackerId
                        });
                } catch (err) {
                    console.log('Error saving to DB:', err);
                }
            }
        }

        function updateLeaderSection() {
            const leaderSection = document.getElementById('leader-section');

            const drinkCounts = state.trackerCounts.drinks || {};
            const leaderEntry = Object.entries(drinkCounts).filter(([name]) => !name.startsWith('_')).sort((a, b) => b[1] - a[1])[0];
            const leaderName = leaderEntry ? leaderEntry[0] : null;

        async function sendMessage(content) {
            if (!content.trim()) return;

            // Add message locally immediately for responsiveness
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const message = {
                id: Date.now(),
                name: state.myName || 'You',
                text: content.trim(),
                time: time,
                timestamp: now.toISOString()
            };
            state.messages.push({ ...message, own: true });
            renderChatView();

            // Sync to Firebase
            syncNewMessage(message);

            // Save to database if connected
            if (supabase && state.eventId && state.myParticipantId) {
                try {
                    await supabase
                        .from('messages')
                        .insert({
                            event_id: state.eventId,
                            participant_id: state.myParticipantId,
                            content: content.trim()
                        });
                } catch (err) {
                    console.log('Error saving message:', err);
                }
            }
        }

        // Real-time subscriptions
        function setupRealtimeSubscriptions() {
            // Subscribe to tracker logs
            supabase
                .channel('tracker_logs')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'tracker_logs',
                    filter: `event_id=eq.${state.eventId}`
                }, async (payload) => {
                    // Skip own tracker updates - already handled locally in incrementTracker()
                    if (payload.new.participant_id === state.myParticipantId) {
                        return;
                    }

                    // Fetch the participant name
                    const { data: participant } = await supabase
                        .from('participants')
                        .select('name')
                        .eq('id', payload.new.participant_id)
                        .single();

                    const name = participant?.name;
                    if (name) {
                        const trackerId = payload.new.tracker_type;
                        if (state.trackerCounts[trackerId]) {
                            state.trackerCounts[trackerId][name] = (state.trackerCounts[trackerId][name] || 0) + 1;
                        }

                        // Add to feed
                        state.feedItems.unshift({
                            person: name,
                            action: `added a ${trackerId.slice(0, -1)}`,
                            emoji: trackers.find(t => t.id === trackerId)?.emoji || '',
                            time: 'just now'
                        });
                        state.feedItems = state.feedItems.slice(0, 10);

                        renderView();
                    }
                })
                .subscribe();

            // Subscribe to messages
            supabase
                .channel('messages')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `event_id=eq.${state.eventId}`
                }, async (payload) => {
                    // Skip own messages - already added locally in sendMessage()
                    if (payload.new.participant_id === state.myParticipantId) {
                        return;
                    }

                    const { data: participant } = await supabase
                        .from('participants')
                        .select('name')
                        .eq('id', payload.new.participant_id)
                        .single();

                    const msgName = participant?.name;
                    const msgText = payload.new.content;

                    state.messages.push({
                        id: payload.new.id,
                        name: msgName,
                        text: msgText,
                        time: new Date(payload.new.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        own: false
                    });

                    // Send notification for new messages from others
                    notifyNewMessage(msgName, msgText);

                    if (state.view === 'chat') renderChatView();
                })
                .subscribe();

            // Subscribe to new participants
            supabase
                .channel('participants')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'participants',
                    filter: `event_id=eq.${state.eventId}`
                }, (payload) => {
                    state.participants.push(payload.new);
                    showToast(`${payload.new.name} joined!`);
                    renderView();
                })
                .subscribe();
        }

        function drawWheel(names, rotation) {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const scale = 2; // 2x for retina
            const size = 260 * scale;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = centerX - 10;

            ctx.clearRect(0, 0, size, size);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);

            const sliceAngle = (2 * Math.PI) / names.length;
            const colors = ['#0073e5', '#00a3e5', '#0088cc', '#005bb5', '#3399ff', '#0066cc', '#004499', '#0077cc'];

            names.forEach((name, i) => {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Draw slice
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw text
                ctx.save();
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.fillText(name.length > 8 ? name.substring(0, 8) + '..' : name, radius - 25, 8);
                ctx.restore();
            });

            ctx.restore();
        }

        function spinWheel() {
            if (wheelSpinning) return;
            wheelSpinning = true;

            const names = state.participants.map(p => p.name);
            const resultEl = document.getElementById('wheelResult');
            const spinBtn = document.getElementById('spinBtn');

            resultEl.textContent = '';
            resultEl.style.animation = '';
            spinBtn.disabled = true;
            spinBtn.style.opacity = '0.5';

            const sliceAngle = (2 * Math.PI) / names.length;

            // Pick winner FIRST, then calculate rotation to land on them
            const winnerIndex = Math.floor(Math.random() * names.length);

            // Calculate rotation to put winner's slice center at top (under pointer)
            // Pointer is at -PI/2 (top). Slice i center is at (i + 0.5) * sliceAngle
            // After rotation R, slice center appears at: (i + 0.5) * sliceAngle + R
            // We want: (i + 0.5) * sliceAngle + R = -PI/2 (mod 2*PI)
            // So: R = -PI/2 - (i + 0.5) * sliceAngle
            const targetAngle = -Math.PI / 2 - (winnerIndex + 0.5) * sliceAngle;

            // Add random full spins (5-8) for visual effect
            const fullSpins = 5 + Math.floor(Math.random() * 4);
            const targetRotation = targetAngle + fullSpins * 2 * Math.PI;

            const startRotation = wheelRotation;
            const spinAmount = targetRotation - startRotation;
            const duration = 4000;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Ease out cubic for natural deceleration
                const easeOut = 1 - Math.pow(1 - progress, 3);
                wheelRotation = startRotation + spinAmount * easeOut;

                drawWheel(names, wheelRotation);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Normalize wheelRotation
                    wheelRotation = wheelRotation % (2 * Math.PI);

                    // Announce the pre-determined winner
                    resultEl.textContent = `🎉 ${names[winnerIndex]}!`;
                    resultEl.style.animation = 'revealScale 0.5s ease forwards';
                    wheelSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.style.opacity = '1';
                }
            }

            animate();
        }

        // Team name generator
        const padelTeamNames = [
            'Ball Handlers', 'Smash & Grab', 'Net & Chill', 'Lob Job', 'Back Court Bangers',
            'Dirty Dribblers', 'Paddle Me Harder', 'Stroke It Right', 'Sweet Spot Swingers', 'Down & Dirty',

        function showPadelTeamWheel() {
            const players = window.padelAvailablePlayers;
            const teams = window.padelCreatedTeams;
            const pickNumber = window.padelCurrentPick;

            if (players.length < 2) {
                // All teams created

            const modal = document.createElement('div');

            modal.innerHTML = `
                <div style="background: var(--glass-strong); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); padding: 24px; border-radius: var(--radius-lg); width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--glass-border);">
                    <h3 style="margin-bottom: 4px;">${title}</h3>

                    <div id="padelTeamWheelResult" style="font-size: 20px; font-weight: 700; min-height: 30px; margin-bottom: 16px;"></div>
                    <button id="padelTeamSpinBtn" onclick="spinPadelTeamWheel()" class="btn-primary" style="background: var(--brand-green);">

                    </button>
                    ${teams.length > 0 ? `

                        </div>

            `;
            document.body.appendChild(modal);

            window.padelTeamWheelRotation = 0;
            drawPadelTeamWheel(players);
        }

        function drawPadelTeamWheel(players) {
            const canvas = document.getElementById('padelTeamWheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 130;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const sliceAngle = (2 * Math.PI) / players.length;
            const colors = ['#f78166', '#3fb950', '#a371f7', '#58a6ff', '#f0c000', '#ff7b72', '#79c0ff', '#d2a8ff', '#7ee787', '#ffa657', '#ff9bce'];

            players.forEach((player, i) => {
                const startAngle = i * sliceAngle + (window.padelTeamWheelRotation || 0);
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = player.color || colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw name
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px -apple-system, sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 2;
                ctx.fillText(player.name, radius - 15, 4);
                ctx.restore();
            });

            // Draw center
            ctx.beginPath();
            ctx.arc(centerX, centerY, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw pointer (on the right)
            ctx.beginPath();
            ctx.moveTo(centerX + radius + 15, centerY);
            ctx.lineTo(centerX + radius - 5, centerY - 15);
            ctx.lineTo(centerX + radius - 5, centerY + 15);
            ctx.closePath();
            ctx.fillStyle = '#1d1d1f';
            ctx.fill();
        }

        window.spinPadelTeamWheel = function() {
            const players = window.padelAvailablePlayers;
            const spinBtn = document.getElementById('padelTeamSpinBtn');
            const resultEl = document.getElementById('padelTeamWheelResult');

            if (window.padelTeamWheelSpinning) return;
            window.padelTeamWheelSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = 'Spinning...';

            const sliceAngle = (2 * Math.PI) / players.length;

            // Pick random winner
            const winnerIndex = Math.floor(Math.random() * players.length);
            const winner = players[winnerIndex];

            // Calculate rotation to land on winner (pointer is on the right, so 0 degrees)
            const targetAngle = -(winnerIndex + 0.5) * sliceAngle;
            const fullSpins = 5 + Math.floor(Math.random() * 3);
            const targetRotation = targetAngle + fullSpins * 2 * Math.PI;

            const duration = 4000;
            const startTime = Date.now();
            const startRotation = window.padelTeamWheelRotation || 0;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease out quart for nice deceleration
                const eased = 1 - Math.pow(1 - progress, 4);

                window.padelTeamWheelRotation = startRotation + (targetRotation - startRotation) * eased;
                drawPadelTeamWheel(players);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    window.padelTeamWheelSpinning = false;
                    resultEl.innerHTML = `<span style="color: ${winner.color || 'var(--brand-green)'}">🎉 ${winner.name}!</span>`;

                    if (window.padelCurrentPick === 1) {
                        // First player picked, now pick second
                        window.padelTempFirstPlayer = winner;
                        window.padelAvailablePlayers = players.filter(p => p.name !== winner.name);
                        window.padelCurrentPick = 2;

                        setTimeout(() => {
                            document.getElementById('padelTeamWheelModal')?.remove();
                            showPadelTeamWheel();
                        }, 1500);
                    } else {
                        // Second player picked, create team
                        const teamName = padelTeamNames.find(n => !window.padelUsedTeamNames.includes(n)) || `Team ${window.padelCreatedTeams.length + 1}`;
                        window.padelUsedTeamNames.push(teamName);

                        window.padelCreatedTeams.push({
                            name: teamName,
                            player1: window.padelTempFirstPlayer.name,
                            player2: winner.name,
                            wins: 0,
                            losses: 0,
                            points: 0
                        });

                        window.padelAvailablePlayers = players.filter(p => p.name !== winner.name);
                        window.padelCurrentPick = 1;
                        window.padelTempFirstPlayer = null;

                        resultEl.innerHTML += `<div style="margin-top: 8px; font-size: 14px; color: var(--text-dim);">Team: <strong>${teamName}</strong></div>`;

                        setTimeout(() => {
                            document.getElementById('padelTeamWheelModal')?.remove();
                            showPadelTeamWheel();
                        }, 2000);
                    }
                }
            }

            animate();
        };

        function removePadelTeam(index) {
            state.padelTeams.splice(index, 1);
            renderPadelView();
        }

        function startGroupStage() {
            state.padelPhase = 'groups';

            // Initialize group matches (round-robin: every team plays every other team)
            state.padelGroupMatches = [];
            const teams = state.padelTeams;
            let matchId = 1;

            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    state.padelGroupMatches.push({
                        id: matchId++,
                        team1: i,
                        team2: j,
                        winner: null,
                        score: ''
                    });
                }
            }

            renderPadelView();
        }

        function renderPadelGroups(screen) {
            const teams = state.padelTeams;
            const matches = state.padelGroupMatches || [];
            const completedMatches = matches.filter(m => m.winner !== null).length;
            const totalMatches = matches.length;

            // Calculate standings
            const standings = teams.map((team, idx) => {
                const teamMatches = matches.filter(m => m.team1 === idx || m.team2 === idx);
                let wins = 0, losses = 0, gamesWon = 0, gamesLost = 0;

                teamMatches.forEach(m => {
                    if (m.winner === null) return;
                    if (m.winner === idx) {
                        wins++;
                        // Parse score for games
                        if (m.score) {
                            const parts = m.score.split(',').map(s => s.trim());
                            parts.forEach(set => {
                                const [a, b] = set.split('-').map(Number);
                                if (!isNaN(a) && !isNaN(b)) {
                                    gamesWon += a;
                                    gamesLost += b;
                                }
                            });
                        }
                    } else {
                        losses++;
                        if (m.score) {
                            const parts = m.score.split(',').map(s => s.trim());
                            parts.forEach(set => {
                                const [a, b] = set.split('-').map(Number);
                                if (!isNaN(a) && !isNaN(b)) {
                                    gamesWon += b;
                                    gamesLost += a;
                                }
                            });
                        }
                    }
                });

                return { ...team, idx, wins, losses, points: wins * 3, gamesWon, gamesLost, gameDiff: gamesWon - gamesLost };
            }).sort((a, b) => b.points - a.points || b.gameDiff - a.gameDiff);

            screen.innerHTML = `
                <div style="padding: 10px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h2 style="font-size: 20px;">🎾 Group Stage</h2>
                        <button onclick="resetPadelTournament()" class="btn-secondary" style="width: auto; padding: 8px 12px; font-size: 13px;">Reset</button>
                    </div>

                    <div style="background: var(--glass-strong); border-radius: var(--radius-md); padding: 12px; margin-bottom: 16px; border: 1px solid var(--glass-border);">
                        <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Standings</div>
                        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--border-subtle);">

        window.showGroupMatchModal = function(matchId) {

        window.setGroupMatchWinner = function(matchId, winnerTeamIdx) {

        function startKnockout() {
            state.padelPhase = 'knockout';

            // Get standings from group stage
            const teams = state.padelTeams;
            const matches = state.padelGroupMatches || [];

            const standings = teams.map((team, idx) => {
                const teamMatches = matches.filter(m => m.team1 === idx || m.team2 === idx);
                let wins = 0, gamesWon = 0, gamesLost = 0;

                teamMatches.forEach(m => {
                    if (m.winner === idx) {
                        wins++;
                        if (m.score) {
                            const parts = m.score.split(',').map(s => s.trim());
                            parts.forEach(set => {
                                const [a, b] = set.split('-').map(Number);
                                if (!isNaN(a) && !isNaN(b)) { gamesWon += a; gamesLost += b; }
                            });
                        }
                    } else if (m.winner !== null) {
                        if (m.score) {
                            const parts = m.score.split(',').map(s => s.trim());
                            parts.forEach(set => {
                                const [a, b] = set.split('-').map(Number);
                                if (!isNaN(a) && !isNaN(b)) { gamesWon += b; gamesLost += a; }
                            });
                        }
                    }
                });

                return { idx, wins, points: wins * 3, gameDiff: gamesWon - gamesLost };
            }).sort((a, b) => b.points - a.points || b.gameDiff - a.gameDiff);

            // Create knockout bracket based on standings
            state.padelKnockoutMatches = [];

            if (standings.length >= 4) {
                // Semi-finals: 1v4, 2v3
                state.padelKnockoutMatches = [
                    { id: 1, round: 'Semi-Final 1', team1: standings[0].idx, team2: standings[3].idx, winner: null, score: '' },
                    { id: 2, round: 'Semi-Final 2', team1: standings[1].idx, team2: standings[2].idx, winner: null, score: '' },
                    { id: 3, round: 'Final', team1: null, team2: null, winner: null, score: '', waitingFor: [1, 2] }
                ];
            } else if (standings.length >= 2) {
                // Just final
                state.padelKnockoutMatches = [
                    { id: 1, round: 'Final', team1: standings[0].idx, team2: standings[1].idx, winner: null, score: '' }
                ];
            }

            renderPadelView();
        }

        function renderPadelKnockout(screen) {

                                    <div style="font-size: 11px; color: ${match.round === 'Final' ? '#ff9500' : 'var(--text-dim)'}; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;">${match.round}</div>

                            <div style="font-size: 14px; opacity: 0.9;">CHAMPIONS</div>

                            <div style="font-size: 14px; opacity: 0.8; margin-top: 4px;">${getTeamDisplay(matches[matches.length - 1].winner).players}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        window.showKnockoutMatchModal = function(matchId) {
            const match = state.padelKnockoutMatches.find(m => m.id === matchId);
            if (!match) return;

            const teams = state.padelTeams;

            const modal = document.createElement('div');

        function resetPadelTournament() {
            state.padelTeams = [];

            renderPadelView();

        function renderChatView() {
            const screen = document.getElementById('screen');
            screen.className = 'screen chat-screen';

            screen.innerHTML = `
                <div class="chat-view">
                    <div class="chat-tabs">
                        <button class="active">Group Chat</button>
                    </div>
                    <div class="reaction-bar">
                        ${['🍺', '⛳', '👍', '👎', '😐', '😂', '🔥', '💀', '🎉', '👀'].map(e => `<button onclick="sendReaction('${e}')">${e}</button>`).join('')}
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        ${state.messages.length ? state.messages.map((msg, idx) => `
                            <div class="chat-message ${msg.own ? 'own' : ''}" data-msg-idx="${idx}">
                                <div class="chat-avatar" style="background: ${getPersonColor(msg.name)}; ${getPersonProfileImage(msg.name) ? `background-image: url('${getPersonProfileImage(msg.name)}'); background-size: cover; background-position: center;` : ''}">${getPersonProfileImage(msg.name) ? '' : (msg.name?.[0] || '?')}</div>

                                                    ${emoji} ${users.length}
                                                </button>
                                            `).join('')}
                                        </div>
                                    ` : ''}
                                    <div class="time">${msg.time}</div>
                                </div>
                            </div>
                        `).join('') : `

                                <p style="color: var(--text-dim); font-size: 14px; margin: 0;">Be the first to say hello!</p>
                            </div>
                        `}
                    </div>
                    <div class="chat-input-area">
                        <button class="chat-gif-btn" onclick="showGifPicker()" style="background: none; border: none; font-size: 20px; padding: 8px; cursor: pointer; opacity: 0.7;">GIF</button>
                        <input type="text" class="chat-input" id="chatInput" placeholder="Message the group...">
                        <button class="chat-send" onclick="handleSendMessage()">➤</button>
                    </div>
                </div>
            `;

            // Scroll to bottom after render
            setTimeout(() => {
                const messagesEl = document.getElementById('chatMessages');
                if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 0);

            // Handle enter key
            const input = document.getElementById('chatInput');
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleSendMessage();
                });
            }

            // Setup long-press for reactions on mobile
            setupMessageLongPress();
        }

        function setupMessageLongPress() {
            const bubbles = document.querySelectorAll('.chat-bubble');
            bubbles.forEach(bubble => {
                let pressTimer = null;
                let didLongPress = false;

                bubble.addEventListener('touchstart', (e) => {
                    didLongPress = false;
                    pressTimer = setTimeout(() => {
                        didLongPress = true;
                        const msgEl = bubble.closest('.chat-message');
                        const msgIdx = parseInt(msgEl?.dataset.msgIdx);
                        if (!isNaN(msgIdx)) {
                            // Vibrate if supported
                            if (navigator.vibrate) navigator.vibrate(50);
                            const touch = e.touches[0];
                            showReactionPicker({ clientX: touch.clientX, clientY: touch.clientY }, msgIdx);
                        }
                    }, 500);
                });

                bubble.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });

                bubble.addEventListener('touchmove', () => {
                    clearTimeout(pressTimer);
                });
            });
        }

        function handleSendMessage() {
            const input = document.getElementById('chatInput');
            if (input && input.value.trim()) {
                sendMessage(input.value);
                input.value = '';
            }
        }

        // Message Reactions
        const reactionEmojis = ['❤️', '😂', '👍', '👎', '🔥', '😮'];

        window.showReactionPicker = function(event, msgIdx) {
            // Remove any existing picker
            document.querySelector('.reaction-picker')?.remove();

            const picker = document.createElement('div');
            picker.className = 'reaction-picker';
            picker.innerHTML = reactionEmojis.map(emoji =>
                `<button onclick="addReaction(${msgIdx}, '${emoji}')">${emoji}</button>`
            ).join('');

            // Position near the tap/click
            const x = Math.min(event.clientX - 100, window.innerWidth - 220);
            const y = event.clientY - 60;
            picker.style.left = `${Math.max(10, x)}px`;
            picker.style.top = `${Math.max(10, y)}px`;

            document.body.appendChild(picker);

            // Close when tapping elsewhere
            setTimeout(() => {
                document.addEventListener('click', function closeReactionPicker(e) {
                    if (!picker.contains(e.target)) {
                        picker.remove();
                        document.removeEventListener('click', closeReactionPicker);
                    }
                });
            }, 10);
        }

        window.addReaction = function(msgIdx, emoji) {
            const msg = state.messages[msgIdx];
            if (!msg) return;

            if (!msg.reactions) msg.reactions = {};
            if (!msg.reactions[emoji]) msg.reactions[emoji] = [];

            const myName = state.myName || 'You';
            if (!msg.reactions[emoji].includes(myName)) {
                msg.reactions[emoji].push(myName);
            }

            document.querySelector('.reaction-picker')?.remove();
            renderChatView();
        }

        window.toggleReaction = function(msgIdx, emoji) {
            const msg = state.messages[msgIdx];
            if (!msg || !msg.reactions || !msg.reactions[emoji]) return;

            const myName = state.myName || 'You';
            const idx = msg.reactions[emoji].indexOf(myName);

            if (idx > -1) {
                // Remove reaction
                msg.reactions[emoji].splice(idx, 1);
                if (msg.reactions[emoji].length === 0) {
                    delete msg.reactions[emoji];
                }
            } else {
                // Add reaction
                msg.reactions[emoji].push(myName);
            }

            renderChatView();
        }

        // Render message content (handles GIFs)
        function renderMessageContent(text) {
            if (!text) return '';

            // Check for GIF tags
            const gifMatch = text.match(/\[GIF\](.*?)\[\/GIF\]/);
            if (gifMatch) {
                return `<img src="${gifMatch[1]}" alt="GIF" style="max-width: 200px; border-radius: 8px; display: block;">`;
            }

            return text;
        }

        async function searchGifs(query) {
            const resultsEl = document.getElementById('gifResults');
            if (!resultsEl) return;

            resultsEl.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 40px;">Loading...</div>';

            try {
                // Use Tenor API (free)
                const endpoint = query.trim()
                    ? `https://tenor.googleapis.com/v2/search?key=${TENOR_API_KEY}&q=${encodeURIComponent(query)}&limit=20&contentfilter=medium`
                    : `https://tenor.googleapis.com/v2/featured?key=${TENOR_API_KEY}&limit=20&contentfilter=medium`;

                const response = await fetch(endpoint);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    resultsEl.innerHTML = data.results.map(gif => {
                        const previewUrl = gif.media_formats.tinygif?.url || gif.media_formats.gif?.url;
                        const fullUrl = gif.media_formats.gif?.url || previewUrl;
                        return `
                            <div onclick="selectGif('${fullUrl}')" style="cursor: pointer; border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: var(--surface-2);">
                                <img src="${previewUrl}" alt="${gif.content_description || 'GIF'}" style="width: 100%; height: 100%; object-fit: cover;">

                } else {
                    resultsEl.innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--text-dim); padding: 40px;">No GIFs found</div>';
                }
            } catch (err) {
                console.error('GIF search error:', err);
                resultsEl.innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--text-dim); padding: 40px;">Failed to load GIFs</div>';

        function setupCoverflowSwipe() {
            const wrapper = document.getElementById('coverflowWrapper');
            if (!wrapper) return;

            let startX = 0;
            let isDragging = false;

            wrapper.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
            }, { passive: true });

            wrapper.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
            }, { passive: true });

            wrapper.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;

                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        // Swipe left - next photo
                        goToPhoto(state.photoIndex + 1);
                    } else {
                        // Swipe right - previous photo
                        goToPhoto(state.photoIndex - 1);
                    }
                }
            }, { passive: true });

            // Mouse support for desktop
            wrapper.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                isDragging = true;
            });

            wrapper.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                const diff = startX - e.clientX;

                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToPhoto(state.photoIndex + 1);
                    } else {
                        goToPhoto(state.photoIndex - 1);
                    }
                }
            });
        }

        function calculateBalances(expenses) {
            const balances = {};
            state.participants.forEach(p => balances[p.name] = 0);

            expenses.forEach(exp => {
                const perPerson = exp.amount / exp.splitBetween.length;
                // Payer is owed money
                balances[exp.paidBy] = (balances[exp.paidBy] || 0) + exp.amount;
                // Each person in split owes their share
                exp.splitBetween.forEach(person => {
                    balances[person] = (balances[person] || 0) - perPerson;
                });
            });

            return balances;
        }

        function calculateSettlements(balances) {
            const settlements = [];
            const debtors = [];
            const creditors = [];

            Object.entries(balances).forEach(([name, balance]) => {
                if (balance < -0.01) debtors.push({ name, amount: -balance });
                else if (balance > 0.01) creditors.push({ name, amount: balance });
            });

            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                const payment = Math.min(debtors[i].amount, creditors[j].amount);
                if (payment > 0.01) {
                    settlements.push({
                        from: debtors[i].name,
                        to: creditors[j].name,
                        amount: payment
                    });
                }
                debtors[i].amount -= payment;
                creditors[j].amount -= payment;
                if (debtors[i].amount < 0.01) i++;
                if (creditors[j].amount < 0.01) j++;
            }

            return settlements;
        }

        function isWrappedUnlocked() {
            // TEMP: Override for preview - remove this line later
            return true;

            // Find the last event in the schedule
            if (!state.activities || state.activities.length === 0) return false;

            const dayOrder = ['Thursday', 'Friday', 'Saturday', 'Sunday', 'Monday', 'Tuesday'];
            const sortedActivities = [...state.activities].sort((a, b) => {
                const dayDiff = dayOrder.indexOf(b.day) - dayOrder.indexOf(a.day);
                if (dayDiff !== 0) return dayDiff;
                // Sort by time (later times first)
                const timeA = a.time.split(' - ')[1] || a.time.split(' - ')[0];
                const timeB = b.time.split(' - ')[1] || b.time.split(' - ')[0];
                return timeB.localeCompare(timeA);
            });

            const lastEvent = sortedActivities[0];
            if (!lastEvent) return false;

            // For demo/testing: always unlocked if we're past Monday
            // In production, check actual date against event date
            const now = new Date();
            const today = now.toLocaleDateString('en-US', { weekday: 'long' });
            const todayIndex = dayOrder.indexOf(today);
            const lastEventIndex = dayOrder.indexOf(lastEvent.day);

            // Unlocked if we're past the last event day
            if (todayIndex > lastEventIndex) return true;

            // If same day, check if past the end time
            if (todayIndex === lastEventIndex) {
                const endTime = lastEvent.time.split(' - ')[1] || lastEvent.time.split(' - ')[0];
                if (endTime === '∞') return false; // Party never ends!
                const [hours, mins] = endTime.split(':').map(Number);
                if (!isNaN(hours)) {
                    const eventEnd = new Date();
                    eventEnd.setHours(hours, mins || 0, 0, 0);
                    return now >= eventEnd;
                }
            }

            return false;
        }

        let wrappedTouchStartX = 0;
        let wrappedTouchEndX = 0;

        function setupWrappedSwipe() {
            const container = document.getElementById('wrappedContainer');
            if (!container) return;

            container.addEventListener('touchstart', (e) => {
                wrappedTouchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                wrappedTouchEndX = e.changedTouches[0].screenX;
                handleWrappedSwipe();
            }, { passive: true });

            // Also allow click/tap to advance
            container.addEventListener('click', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                // Tap on right half = next, left half = previous
                if (x > rect.width / 2) {
                    nextWrappedSlide();
                } else {
                    prevWrappedSlide();
                }
            });
        }

        function handleWrappedSwipe() {
            const diff = wrappedTouchStartX - wrappedTouchEndX;
            if (Math.abs(diff) > 50) { // Minimum swipe distance
                if (diff > 0) {
                    nextWrappedSlide(); // Swipe left = next
                } else {
                    prevWrappedSlide(); // Swipe right = previous
                }
            }
        }

        window.nextWrappedSlide = function() {
            const totalSlides = 10;
            wrappedSlide = (wrappedSlide + 1) % totalSlides;
            renderWrappedView();
        };

        window.prevWrappedSlide = function() {
            const totalSlides = 10;
            wrappedSlide = (wrappedSlide - 1 + totalSlides) % totalSlides;
            renderWrappedView();
        };

        // ========== MORNING BRIEF FUNCTIONS ==========

        function getTripDay() {
            // Calculate day of trip based on activities
            const startDate = new Date('2026-03-19'); // Thursday
            const today = new Date();
            const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            return Math.max(1, Math.min(diffDays, 5));
        }

        function calculateMVP() {
            const totals = {};
            const participants = state.participants;

            participants.forEach(p => {
                const name = p.name;
                totals[name] = 0;
                Object.keys(state.trackerCounts).forEach(trackerId => {
                    totals[name] += (state.trackerCounts[trackerId]?.[name] || 0);
                });
            });

            const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
            if (sorted.length === 0 || sorted[0][1] === 0) {
                return { name: 'TBD', color: '#888', score: 0 };
            }

            const mvpName = sorted[0][0];
            const mvpScore = sorted[0][1];
            const mvpPerson = participants.find(p => p.name === mvpName);

            return {
                name: mvpName,
                color: mvpPerson?.color || '#888',
                score: mvpScore
            };
        }

        function getStandings() {
            const totals = {};
            const participants = state.participants;

            // Point values per tracker
            const pointValues = {
                drinks: 1,
                clubs: 1,
                birdies: 1,
                holeinone: 100
            };

            participants.forEach(p => {
                const name = p.name;
                totals[name] = 0;
                Object.keys(state.trackerCounts).forEach(trackerId => {
                    const count = state.trackerCounts[trackerId]?.[name] || 0;
                    const pointValue = pointValues[trackerId] || 1;
                    totals[name] += count * pointValue;
                });
            });

            return Object.entries(totals)
                .map(([name, score]) => ({
                    name,
                    score,
                    color: participants.find(p => p.name === name)?.color || '#888'
                }))
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);
        }

        function getMoneyOwed() {
            if (state.expenses.length === 0) return null;

            // Calculate balances from expenses
            const participants = state.participants;
            const balances = {};
            participants.forEach(p => balances[p.name] = 0);

            state.expenses.forEach(exp => {
                const splitAmount = exp.amount / exp.splitBetween.length;
                exp.splitBetween.forEach(name => {
                    if (name !== exp.paidBy) {
                        balances[name] = (balances[name] || 0) - splitAmount;
                    }
                });
                balances[exp.paidBy] = (balances[exp.paidBy] || 0) + (exp.amount - (exp.amount / exp.splitBetween.length));
            });

            const sorted = Object.entries(balances).sort((a, b) => a[1] - b[1]);
            if (sorted.length === 0 || sorted[0][1] >= 0) return null;

            const [name, balance] = sorted[0];
            return {
                name,
                amount: Math.abs(balance).toFixed(2),
                color: participants.find(p => p.name === name)?.color || '#888'
            };
        }

        function getDramaStat() {
            const drinks = state.trackerCounts.drinks || {};
            const sorted = Object.entries(drinks).sort((a, b) => b[1] - a[1]);

            if (sorted.length < 2 || sorted[0][1] === 0) {
                return { type: 'none', text: 'The race is just getting started!' };
            }

            const leader = sorted[0];
            const second = sorted[1];
            const gap = leader[1] - second[1];

            if (gap <= 2) {
                return {
                    type: 'close_race',
                    text: `<strong>${second[0]}</strong> is only <strong>${gap} drink${gap === 1 ? '' : 's'}</strong> behind <strong>${leader[0]}</strong>!`
                };
            }

            return {
                type: 'leader',
                text: `<strong>${leader[0]}</strong> is leading with <strong>${leader[1]} drinks</strong>!`
            };
        }

        async function fetchWeather() {
            // Small delay to ensure DOM is ready
            await new Promise(resolve => setTimeout(resolve, 100));

            const widget = document.getElementById('weather-widget');
            if (!widget) return;

            try {
                // Lisbon coordinates
                const lat = 38.7223;
                const lon = -9.1393;
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Europe/Lisbon&forecast_days=1`);

                if (!response.ok) throw new Error('Weather API error');

                const data = await response.json();

                const temp = Math.round(data.current.temperature_2m);
                const weatherCode = data.current.weather_code;
                const windSpeed = Math.round(data.current.wind_speed_10m);
                const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
                const minTemp = Math.round(data.daily.temperature_2m_min[0]);

                const weatherEmoji = getWeatherEmoji(weatherCode);
                const weatherDesc = getWeatherDescription(weatherCode);

                // Check widget still exists after async call
                const widgetNow = document.getElementById('weather-widget');
                if (widgetNow) {
                    widgetNow.innerHTML = `
                        <div class="weather-main">
                            <span class="weather-icon">${weatherEmoji}</span>
                            <span class="weather-temp">${temp}°C</span>
                        </div>
                        <div class="weather-details">
                            <div class="weather-desc">${weatherDesc}</div>
                            <div class="weather-range">H: ${maxTemp}° L: ${minTemp}° · Wind: ${windSpeed} km/h</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.log('Weather fetch error:', error);
                const widgetNow = document.getElementById('weather-widget');
                if (widgetNow) {
                    widgetNow.innerHTML = `
                        <div class="weather-main">
                            <span class="weather-icon">☀️</span>
                            <span class="weather-temp">22°C</span>
                        </div>
                        <div class="weather-details">
                            <div class="weather-desc">Sunny</div>
                            <div class="weather-range">Perfect golf weather</div>
                        </div>
                    `;
                }
            }
        }

        function getWeatherEmoji(code) {
            if (code === 0) return '☀️';
            if (code <= 3) return '⛅';
            if (code <= 48) return '🌫️';
            if (code <= 57) return '🌧️';
            if (code <= 67) return '🌧️';
            if (code <= 77) return '🌨️';
            if (code <= 82) return '🌧️';
            if (code <= 86) return '🌨️';
            if (code >= 95) return '⛈️';
            return '🌤️';
        }

        function getWeatherDescription(code) {
            if (code === 0) return 'Clear sky';
            if (code <= 3) return 'Partly cloudy';
            if (code <= 48) return 'Foggy';
            if (code <= 57) return 'Drizzle';
            if (code <= 67) return 'Rain';
            if (code <= 77) return 'Snow';
            if (code <= 82) return 'Rain showers';
            if (code <= 86) return 'Snow showers';
            if (code >= 95) return 'Thunderstorm';
            return 'Cloudy';
        }

        // ========== RALLII CHECK FUNCTIONS ==========

        function getActiveCheck() {
            const now = Date.now();
            return state.ralliiChecks.find(c => new Date(c.expiresAt).getTime() > now);
        }

        function startRalliiCheck() {
            const myName = state.myName || 'Someone';
            const now = new Date();
            const expiresAt = new Date(now.getTime() + 2 * 60 * 1000); // 2 minutes

            const newCheck = {
                id: now.getTime().toString(),
                startedBy: myName,
                startedAt: now.toISOString(),
                expiresAt: expiresAt.toISOString(),
                responses: []
            };

            state.ralliiChecks.push(newCheck);

            // Sync to Firebase
            syncRalliiCheck(newCheck);

            // Add to feed
            state.feedItems.unshift({
                participantName: myName,
                action: 'started a RALLII Check!',
                emoji: '📸',
                timestamp: now.toISOString()
            });

            showToast('🔔 RALLII CHECK started!');
            renderView();

            // Mark as seen so we don't show ourselves the popup
            state.seenCheckIds.push(newCheck.id);

            startCheckTimer(newCheck.id);
        }

        function showRalliiCheckPopup(check) {
            // Mark as seen
            state.seenCheckIds.push(check.id);

            // Check if already responded
            const myName = state.myName || 'You';
            const alreadyResponded = check.responses?.find(r => r.participantName === myName);
            if (alreadyResponded) return;

            // Create popup
            const popup = document.createElement('div');
            popup.className = 'rallii-check-popup';
            popup.id = `check-popup-${check.id}`;

            // Calculate time remaining
            const remaining = new Date(check.expiresAt).getTime() - Date.now();
            if (remaining <= 0) return;

            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);

            popup.innerHTML = `
                <div class="check-popup-content">
                    <div class="check-popup-header">
                        <span class="check-popup-icon">📸</span>
                        <span class="check-popup-title">RALLII CHECK!</span>
                    </div>
                    <div class="check-popup-subtitle">${check.startedBy} wants to see what you're doing</div>
                    <div class="check-popup-timer">⏱️ <span class="popup-timer-value">${mins}:${secs.toString().padStart(2, '0')}</span> left</div>
                    <div class="check-popup-actions">
                        <button class="check-popup-btn snap" onclick="respondToCheckFromPopup('${check.id}')">
                            <span>📷</span>
                            <span>Snap</span>
                        </button>
                        <button class="check-popup-btn skip" onclick="dismissCheckPopup('${check.id}')">
                            <span>✕</span>
                            <span>Skip</span>
                        </button>
                    </div>
                </div>
            `;

            document.body.appendChild(popup);

            // Start countdown timer
            const timerInterval = setInterval(() => {
                const now = Date.now();
                const remaining = new Date(check.expiresAt).getTime() - now;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    popup.remove();
                    return;
                }

                const timerEl = popup.querySelector('.popup-timer-value');
                if (timerEl) {
                    const mins = Math.floor(remaining / 60000);
                    const secs = Math.floor((remaining % 60000) / 1000);
                    timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);

            // Store interval for cleanup
            popup.dataset.timerId = timerInterval;

            // Animate in
            requestAnimationFrame(() => popup.classList.add('show'));
        }

        function dismissCheckPopup(checkId) {
            const popup = document.getElementById(`check-popup-${checkId}`);
            if (popup) {
                clearInterval(parseInt(popup.dataset.timerId));
                popup.classList.remove('show');
                setTimeout(() => popup.remove(), 300);

        function ensureUserInParticipants() {
            if (!state.myName || state.myName === 'You' || !db) return;

            // Check if user already in participants
            const existingParticipant = state.participants.find(p => p.name === state.myName);
            if (existingParticipant) {
                console.log('User already in participants');
                return;
            }

            // Add user to Firebase participants
            const newParticipant = {
                name: state.myName,
                color: defaultColors[state.participants.length % defaultColors.length],
                joinedAt: new Date().toISOString()
            };

            const newIndex = state.participants.length;
            db.ref(`trips/${TRIP_ID}/participants/${newIndex}`).set(newParticipant)
                .then(() => {
                    console.log('Added user to Firebase participants:', state.myName);
                    state.participants.push(newParticipant);

                    renderView();

                    const secs = Math.floor((remaining % 60000) / 1000);
                    timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);

        function renderGolfView() {
            const screen = document.getElementById('screen');
            screen.className = 'screen';

            const holes = state.golfHoles;
            const pars = state.golfPars || [];
            const currentGroup = state.golfGroups[state.selectedGolfGroup];
            const golfPlayers = currentGroup?.players || [];

            // Get player objects for those playing golf
            const players = golfPlayers.map(name => {
                const p = state.participants.find(p => p.name === name);
                return p || { name, color: '#888' };
            });

            // Initialize scores for players if not exists
            players.forEach(p => {
                if (!currentGroup.scores[p.name]) {
                    currentGroup.scores[p.name] = new Array(holes).fill('');
                }
            });

            const getTotal = (name) => {
                const scores = currentGroup.scores[name] || [];
                return scores.reduce((sum, s) => sum + (parseInt(s) || 0), 0);
            };

            const getVsPar = (name) => {
                const scores = currentGroup.scores[name] || [];
                let total = 0;
                let parTotal = 0;
                for (let i = 0; i < holes; i++) {
                    const score = parseInt(scores[i]);
                    if (score) {
                        total += score;
                        parTotal += pars[i] || 4;
                    }
                }
                if (total === 0) return '-';
                const diff = total - parTotal;
                if (diff > 0) return '+' + diff;
                if (diff < 0) return diff.toString();
                return 'E';
            };

            const totalPar = pars.slice(0, holes).reduce((a, b) => a + b, 0);

            screen.innerHTML = `
                <div class="golf-scorecard">
                    <div class="golf-header">
                        <h3>⛳ ${state.golfCourse}</h3>
                        <div style="font-size: 13px; opacity: 0.8; margin-top: 4px;">${holes} Holes · Par ${totalPar}</div>
                    </div>

                    <!-- Group Tabs -->
                    <div style="display: flex; gap: 4px; padding: 12px; background: var(--surface);">
                        ${state.golfGroups.map((g, i) => `
                            <button onclick="selectGolfGroup(${i})" style="flex: 1; padding: 10px 8px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; background: ${i === state.selectedGolfGroup ? 'var(--brand-green)' : 'var(--bg)'}; color: ${i === state.selectedGolfGroup ? '#fff' : 'var(--text)'};">
                                ${g.name}${g.players.length ? ` (${g.players.length})` : ''}
                            </button>
                        `).join('')}
                    </div>

                    ${players.length > 0 ? `
                    <div class="golf-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Hole</th>
                                    ${Array.from({length: holes}, (_, i) => `<th>${i + 1}</th>`).join('')}
                                    <th class="golf-total">Tot</th>
                                    <th class="golf-total">+/-</th>
                                </tr>
                                <tr style="background: rgba(0, 115, 229, 0.15); color: var(--brand-green);">
                                    <td style="background: rgba(0, 115, 229, 0.15); font-weight: 600;">Par</td>
                                    ${Array.from({length: holes}, (_, i) => `<td style="font-weight: 600;">${pars[i] || 4}</td>`).join('')}
                                    <td class="golf-total">${totalPar}</td>
                                    <td class="golf-total">-</td>
                                </tr>
                            </thead>
                            <tbody>
                                ${players.map(p => `
                                    <tr>
                                        <td style="color: ${p.color}; font-weight: 600;">${p.name}</td>
                                        ${Array.from({length: holes}, (_, i) => `
                                            <td>
                                                <input type="number"
                                                    value="${currentGroup.scores[p.name]?.[i] || ''}"
                                                    onchange="updateGolfScore('${p.name}', ${i}, this.value)"
                                                    min="1" max="12">
                                            </td>
                                        `).join('')}
                                        <td class="golf-total">${getTotal(p.name) || '-'}</td>
                                        <td class="golf-total">${getVsPar(p.name)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    ` : `
                    <div style="padding: 40px 20px; text-align: center; color: var(--text-dim);">
                        No players in ${currentGroup.name}.<br>Tap "Edit Players" to add golfers.
                    </div>
                    `}
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button class="golf-btn" onclick="setGolfHoles(9)">9 Holes</button>
                    <button class="golf-btn" onclick="setGolfHoles(18)">18 Holes</button>
                </div>
                <button class="add-challenge-btn" onclick="showEditPlayersModal()">Edit Players - ${currentGroup.name}</button>
                <button class="add-challenge-btn" style="background: var(--surface); color: var(--text); margin-top: 8px;" onclick="showEditGroupNameModal()">Rename Group</button>
                <button class="add-challenge-btn" style="background: var(--surface); color: var(--text); margin-top: 8px;" onclick="showEditCourseModal()">Edit Course Name</button>
            `;
        }

        function updateGolfScore(player, hole, value) {
            const currentGroup = state.golfGroups[state.selectedGolfGroup];
            if (!currentGroup.scores[player]) {
                currentGroup.scores[player] = new Array(state.golfHoles).fill('');
            }
            currentGroup.scores[player][hole] = value;
        }

        function setGolfHoles(num) {
            state.golfHoles = num;
            // Adjust existing scores in all groups
            state.golfGroups.forEach(group => {
                Object.keys(group.scores).forEach(player => {
                    const current = group.scores[player];
                    if (current.length < num) {
                        group.scores[player] = [...current, ...new Array(num - current.length).fill('')];
                    } else {
                        group.scores[player] = current.slice(0, num);
                    }
                });
            });
            renderView();
        }

        // Login handlers
        async function handleJoin() {
            // Make sure Supabase is ready
            if (!initSupabase()) {
                alert('Still connecting to server. Please wait and try again.');
                return;
            }

            const name = document.getElementById('nameInput').value.trim();
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const errorEl = document.getElementById('loginError');

            if (!name || !code) {
                if (errorEl) errorEl.textContent = 'Please enter your name and event code';
                return;
            }

            document.getElementById('joinBtn').disabled = true;
            errorEl.textContent = '';

            try {
                const { event, participant } = await joinEvent(code, name);
                state.eventId = event.id;
                state.eventCode = event.code;
                state.eventName = event.name;
                state.myName = participant.name;
                state.myParticipantId = participant.id;

                saveSession();
                await loadEventData();
                setupRealtimeSubscriptions();
                showMainApp();
            } catch (err) {
                errorEl.textContent = err.message || 'Failed to join event';
            }

            document.getElementById('joinBtn').disabled = false;
        }

        async function handleCreate() {
            const eventNameEl = document.getElementById('eventNameInput');
            const creatorNameEl = document.getElementById('creatorNameInput');
            const errorEl = document.getElementById('createError');
            const btn = document.getElementById('createEventBtn');

            const eventName = eventNameEl ? eventNameEl.value.trim() : '';
            const creatorName = creatorNameEl ? creatorNameEl.value.trim() : '';

            if (!eventName || !creatorName) {
                if (errorEl) errorEl.textContent = 'Please fill in both fields';
                alert('Please fill in both the event name and your name');
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Creating...';
            }
            if (errorEl) errorEl.textContent = '';

            try {
                const { event, participant } = await createEvent(eventName, creatorName);
                state.eventId = event.id;
                state.eventCode = event.code;
                state.eventName = event.name;
                state.myName = participant.name;
                state.myParticipantId = participant.id;

                saveSession();
                await loadEventData();
                setupRealtimeSubscriptions();
                showMainApp();
                alert('Event created! Your code is: ' + event.code);
            } catch (err) {
                console.error('Create event error:', err);
                const msg = err.message || 'Failed to create event. Check your connection.';
                if (errorEl) errorEl.textContent = msg;
                alert('Error: ' + msg);
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Create Event';
                }
            }
        }

            document.getElementById('onboardingScreen').classList.add('hidden');

            if (onboardingName) {
                document.getElementById('nameInput').value = onboardingName;
            }

            // Actually join the event
            const name = onboardingName;
            const code = 'LISBON';

            try {
                const { event, participant } = await joinEvent(code, name);
                state.eventId = event.id;
                state.eventCode = event.code;
                state.eventName = event.name;
                state.myName = participant.name;
                state.myParticipantId = participant.id;

                // Save profile image if set
                if (onboardingProfileImage) {
                    const me = state.participants.find(p => p.name === state.myName);
                    if (me) {
                        me.profileImage = onboardingProfileImage;
                        syncParticipantProfileImage(me);
                    } else {
                        // If not in participants yet, save to local and sync later
                        localStorage.setItem('rallii_pendingProfileImage', onboardingProfileImage);
                    }
                }

                saveSession();
                localStorage.setItem('rallii_onboarded', 'true');
                await loadEventData();

                // Apply pending profile image after load
                const pendingImage = localStorage.getItem('rallii_pendingProfileImage');
                if (pendingImage) {
                    const me = state.participants.find(p => p.name === state.myName);
                    if (me) {
                        me.profileImage = pendingImage;
                        syncParticipantProfileImage(me);
                    }
                    localStorage.removeItem('rallii_pendingProfileImage');
                }

                setupRealtimeSubscriptions();
                showMainApp();

                console.error('Join error during onboarding:', err);

                document.getElementById('loginScreen').classList.remove('hidden');

        // Notifications
        let notificationsEnabled = false;

        async function requestNotifications() {
            if (!('Notification' in window)) {
                console.log('Notifications not supported');
                return false;
            }

            if (Notification.permission === 'granted') {
                notificationsEnabled = true;
                return true;
            }

            if (Notification.permission !== 'denied') {
                const permission = await Notification.requestPermission();
                notificationsEnabled = permission === 'granted';
                return notificationsEnabled;
            }

            return false;
        }

        function sendNotification(title, body, icon = '🎉') {
            if (!notificationsEnabled || Notification.permission !== 'granted') return;

            try {
                new Notification(title, {
                    body,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">' + icon + '</text></svg>',
                    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏁</text></svg>',
                    vibrate: [200, 100, 200]
                });
            } catch (e) {
                console.log('Notification error:', e);
            }
        }

        // Check for upcoming events every minute
        let scheduleCheckInterval = null;
        const notifiedEvents = new Set();

        function startScheduleNotifications() {
            if (scheduleCheckInterval) return;

            scheduleCheckInterval = setInterval(() => {
                checkUpcomingEvents();
            }, 60000); // Check every minute

            // Also check immediately
            checkUpcomingEvents();
        }

        function checkUpcomingEvents() {
            if (!notificationsEnabled || !state.activities) return;

            const now = new Date();
            const today = now.toLocaleDateString('en-US', { weekday: 'long' });

            state.activities.forEach(act => {
                if (act.day !== today) return;

                // Parse the event time
                const timeStr = act.time.split(' - ')[0];
                const [hours, mins] = timeStr.split(':').map(Number);
                if (isNaN(hours)) return;

                const eventTime = new Date();
                eventTime.setHours(hours, mins || 0, 0, 0);

                // Check if event is 30 minutes away
                const diff = eventTime - now;
                const thirtyMins = 30 * 60 * 1000;
                const eventKey = `${act.day}-${act.time}-${act.title}`;

                if (diff > 0 && diff <= thirtyMins && !notifiedEvents.has(eventKey)) {
                    notifiedEvents.add(eventKey);
                    sendNotification(
                        `${act.emoji} ${act.title} in 30 mins!`,
                        `📍 ${act.location}`,
                        act.emoji
                    );
                }
            });
        }

        }

        window.previewProfileImage = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();

                        e.target.result,
                        function(croppedImage) {

                        },
                        function() {
