                    );
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Centralized Image Cropper
        let cropperModal = null;
        let cropperCallback = null;
        let cropperCancelCallback = null;
        let cropState = { x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0 };

        // Event handler references for cleanup
        let cropperHandlers = {
            mousedown: null,
            touchstart: null,
            mousemove: null,
            touchmove: null,
            mouseup: null,
            touchend: null
        };

        window.showImageCropper = function(imageSrc, onApply, onCancel) {
            // Clean up any existing cropper
            cleanupCropper();

            // Reset state
            cropState = { x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0 };
            cropperCallback = onApply || null;
            cropperCancelCallback = onCancel || null;

            cropperModal = document.createElement('div');
            cropperModal.className = 'modal-overlay';
            cropperModal.id = 'cropperModal';
            cropperModal.innerHTML = `
                <div class="modal-content" style="text-align: center; max-width: 320px;">
                    <h3>Adjust Photo</h3>
                    <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 12px;">Drag to position, pinch to zoom</p>

                    <div style="position: relative; width: 200px; height: 200px; margin: 0 auto 16px; border-radius: 50%; overflow: hidden; border: 3px solid var(--brand-blue);">
                        <div id="cropArea" style="width: 100%; height: 100%; overflow: hidden; touch-action: none;">
                            <img id="cropImage" src="${imageSrc}" style="position: absolute; cursor: move; max-width: none;" draggable="false">
                        </div>
                    </div>

                    <div class="modal-buttons">
                        <button class="modal-cancel" id="cropCancelBtn">Cancel</button>
                        <button class="modal-confirm" id="cropApplyBtn">Apply</button>
                    </div>
                </div>
            `;
            document.body.appendChild(cropperModal);

            // Initialize cropper after DOM is ready
            setTimeout(() => initCropper(), 50);
        }

        function initCropper() {
            const img = document.getElementById('cropImage');
            const area = document.getElementById('cropArea');
            const cancelBtn = document.getElementById('cropCancelBtn');
            const applyBtn = document.getElementById('cropApplyBtn');

            if (!img || !area) return;

            // Track pinch state
            let lastPinchDist = 0;

            img.onload = function() {
                // Calculate scale to fit image in circle
                const areaSize = 200;
                const minDimension = Math.min(img.naturalWidth, img.naturalHeight);
                const fitScale = areaSize / minDimension;

                cropState.scale = fitScale;
                cropState.baseScale = fitScale;

                // Center image
                const imgW = img.naturalWidth * cropState.scale;
                const imgH = img.naturalHeight * cropState.scale;
                cropState.x = (areaSize - imgW) / 2;
                cropState.y = (areaSize - imgH) / 2;
                updateCropPosition();
            };

            // Get distance between two touch points
            function getPinchDist(touches) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            // Create bound handlers
            cropperHandlers.mousedown = function(e) { startDrag(e); };
            cropperHandlers.touchstart = function(e) {
                if (e.touches.length === 2) {
                    // Pinch start
                    e.preventDefault();
                    lastPinchDist = getPinchDist(e.touches);
                    cropState.dragging = false;
                } else if (e.touches.length === 1) {
                    startDrag(e);
                }
            };
            cropperHandlers.mousemove = function(e) { doDrag(e); };
            cropperHandlers.touchmove = function(e) {
                if (e.touches.length === 2) {
                    // Pinch zoom
                    e.preventDefault();
                    const newDist = getPinchDist(e.touches);
                    if (lastPinchDist > 0) {
                        const delta = newDist - lastPinchDist;
                        const newScale = cropState.scale * (1 + delta * 0.005);
                        // Clamp scale between 0.1 and 5
                        cropState.scale = Math.max(0.1, Math.min(5, newScale));
                        updateCropPosition();
                    }
                    lastPinchDist = newDist;
                } else if (e.touches.length === 1 && cropState.dragging) {
                    doDrag(e);
                }
            };
            cropperHandlers.mouseup = function() { endDrag(); };
            cropperHandlers.touchend = function(e) {
                lastPinchDist = 0;
                if (e.touches.length === 0) {
                    endDrag();
                }
            };

            // Mouse wheel zoom for desktop
            cropperHandlers.wheel = function(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newScale = cropState.scale * (1 + delta);
                cropState.scale = Math.max(0.1, Math.min(5, newScale));
                updateCropPosition();
            };

            // Add event listeners
            area.addEventListener('mousedown', cropperHandlers.mousedown);
            area.addEventListener('touchstart', cropperHandlers.touchstart, { passive: false });
            area.addEventListener('wheel', cropperHandlers.wheel, { passive: false });
            document.addEventListener('mousemove', cropperHandlers.mousemove);
            document.addEventListener('touchmove', cropperHandlers.touchmove, { passive: false });
            document.addEventListener('mouseup', cropperHandlers.mouseup);
            document.addEventListener('touchend', cropperHandlers.touchend);

            // Buttons
            cancelBtn.addEventListener('click', cancelCrop);
            applyBtn.addEventListener('click', applyCrop);
        }

        function startDrag(e) {
            e.preventDefault();
            cropState.dragging = true;
            const point = e.touches ? e.touches[0] : e;
            cropState.startX = point.clientX - cropState.x;
            cropState.startY = point.clientY - cropState.y;
        }

        function doDrag(e) {
            if (!cropState.dragging) return;
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            cropState.x = point.clientX - cropState.startX;
            cropState.y = point.clientY - cropState.startY;
            updateCropPosition();
        }

        function endDrag() {
            cropState.dragging = false;
        }

        function updateCropZoom(value) {
            const img = document.getElementById('cropImage');
            if (!img) return;

            const oldScale = cropState.scale;
            cropState.scale = value / 100;

            // Adjust position to zoom from center
            const areaSize = 200;
            const centerX = areaSize / 2;
            const centerY = areaSize / 2;

            cropState.x = centerX - (centerX - cropState.x) * (cropState.scale / oldScale);
            cropState.y = centerY - (centerY - cropState.y) * (cropState.scale / oldScale);

            updateCropPosition();
        }

        function updateCropPosition() {
            const img = document.getElementById('cropImage');
            if (!img) return;
            img.style.width = (img.naturalWidth * cropState.scale) + 'px';
            img.style.height = (img.naturalHeight * cropState.scale) + 'px';
            img.style.left = cropState.x + 'px';
            img.style.top = cropState.y + 'px';
        }

        function cleanupCropper() {
            // Remove document event listeners
            if (cropperHandlers.mousemove) {
                document.removeEventListener('mousemove', cropperHandlers.mousemove);
                document.removeEventListener('touchmove', cropperHandlers.touchmove);
                document.removeEventListener('mouseup', cropperHandlers.mouseup);
                document.removeEventListener('touchend', cropperHandlers.touchend);
            }
            // Remove modal
            if (cropperModal) {
                cropperModal.remove();
                cropperModal = null;
            }
            // Also remove any stray modal
            document.getElementById('cropperModal')?.remove();
        }

        function cancelCrop() {
            const callback = cropperCancelCallback;
            cleanupCropper();
            if (callback) callback();
        }

        window.applyCrop = function() {
            const img = document.getElementById('cropImage');
            if (!img) return;

            const canvas = document.createElement('canvas');
            const size = 200;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Draw the visible portion
            const sourceX = -cropState.x / cropState.scale;
            const sourceY = -cropState.y / cropState.scale;
            const sourceSize = size / cropState.scale;

            ctx.drawImage(img, sourceX, sourceY, sourceSize, sourceSize, 0, 0, size, size);

            const croppedImage = canvas.toDataURL('image/jpeg', 0.8);

            // Get callback before cleanup
            const callback = cropperCallback;
            cleanupCropper();

            // Call the callback with the cropped image
            if (callback) {
                callback(croppedImage);
            } else {
                // Default behavior - save to current user's profile
                const participant = state.participants.find(p => p.name === state.myName);
                if (participant) {
                    participant.profileImage = croppedImage;
                    syncParticipantProfileImage(participant);
                    showToast('Profile photo updated!');
                    renderView();
                    showSettingsPanel();
                } else {
                    showToast('Error: Participant not found');
                }
            }
        }

        window.removeProfileImage = function() {
            const preview = document.getElementById('profilePreview');
            preview.style.backgroundImage = '';
            preview.textContent = state.myName ? state.myName[0].toUpperCase() : '?';
            preview.dataset.newImage = '';

        window.saveProfileImage = function() {
            const preview = document.getElementById('profilePreview');
            const newImage = preview.dataset.newImage;
            const shouldRemove = preview.dataset.remove === 'true';

            // Find participant and update
            const participant = state.participants.find(p => p.name === state.myName);
            if (participant) {
                if (shouldRemove) {
                    delete participant.profileImage;
                } else if (newImage) {
                    // Compress image before saving
                    compressImage(newImage, (compressed) => {
                        participant.profileImage = compressed;
                        syncParticipantProfileImage(participant);
                        document.querySelector('.modal-overlay')?.remove();
                        showToast('Profile photo updated!');
                        showSettingsPanel();
                    });
                    return;
                }
                syncParticipantProfileImage(participant);
            }

            document.querySelector('.modal-overlay')?.remove();
            showToast(shouldRemove ? 'Profile photo removed!' : 'Profile photo updated!');
            showSettingsPanel();
        }

        function compressImage(dataUrl, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 200;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxSize) {
                        height *= maxSize / width;
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width *= maxSize / height;
                        height = maxSize;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = dataUrl;
        }

        function syncParticipantProfileImage(participant) {
            if (!db) return;
            const participantIndex = state.participants.findIndex(p => p.name === participant.name);

                db.ref(`trips/${TRIP_ID}/participants/${participantIndex}`).set({

                    color: participant.color,

                }).then(() => {

                    renderView();
                }).catch(err => {
                    console.error('Failed to sync profile image:', err);
                });
            }
        }

                return;

            if (state.participants.some(p => p.name.toLowerCase() === name.toLowerCase())) {

            const color = defaultColors[state.participants.length % defaultColors.length];
            const newParticipant = { name, color };

            // Add to database
            if (state.eventId && supabase) {
                try {
                    const { data } = await supabase
                        .from('participants')
                        .insert({ event_id: state.eventId, name, color })
                        .select()
                        .single();
                    if (data) newParticipant.id = data.id;
                } catch (e) {
                    console.error('Failed to add participant:', e);

            }

            state.participants.push(newParticipant);
            showToast(`${name} added!`);
            showManageParticipantsModal();

                        .from('participants')
                        .delete()

                const key = localStorage.key(i);

                    keysToRemove.push(key);

            sessionStorage.clear();

            // Reset Firebase data

                try {
                    await db.ref(`trips/${TRIP_ID}`).set({
                        trackerCounts: { drinks: {}, clubs: {}, birdies: {}, holeinone: {} },

                    setTimeout(() => {
                        splash.classList.add('hidden');
                    }, 400);
                }, 2500);
            }

            // Setup login form handlers
            document.getElementById('joinBtn').addEventListener('click', handleJoin);

            // Enter key handler for name input
            document.getElementById('nameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleJoin();
            });

            // Tab switching
            document.querySelectorAll('.view-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.view = tab.dataset.view;
                    renderView();
                });
            });

            // Check for saved session
            checkSession();

            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker error:', err));
            }
        });

        async function checkSession() {
            // Wait for Supabase to be ready
            if (!initSupabase()) {
                // If Supabase isn't loaded yet, wait and retry
                setTimeout(checkSession, 100);
                return;
            }

            if (loadSession() && state.eventId) {
                try {
                    const { data: event } = await supabase
                        .from('events')
                        .select()
                        .eq('id', state.eventId)
                        .single();

                    if (event) {
                        state.eventName = event.name;
                        await loadEventData();
                        setupRealtimeSubscriptions();
                        showMainApp();
                        return;
                    }
                } catch (err) {
                    clearSession();
                }
            }

            // Check if user has completed onboarding before
            const hasOnboarded = localStorage.getItem('rallii_onboarded');
            if (hasOnboarded) {
                // They've onboarded before, show simple login
                showLoginScreen();
            } else {
                // New user, show onboarding
                startOnboarding();
            }
        }
    </script>
</body>
</html>
