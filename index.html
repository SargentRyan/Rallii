    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: rgba(255, 255, 255, 0.5);
            --bg-solid: rgba(255, 255, 255, 0.85);
            --surface: rgba(255, 255, 255, 0.45);
            --surface-solid: rgba(248, 249, 250, 0.8);
            --surface-2: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.6);
            --border-subtle: rgba(0, 0, 0, 0.04);
            --text: #1d1d1f;
            --text-dim: rgba(0, 0, 0, 0.45);
            --accent: #007aff;
            --accent-2: #34c759;
            --accent-3: #af52de;
            --accent-4: #ff3b30;
            --accent-5: #34c759;
            --gold: #ff9500;
            --brand-green: #0073e5;
            --brand-blue: #0073e5;
            --brand-lime: #0073e5;
            --glass: rgba(255, 255, 255, 0.55);
            --glass-strong: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.06), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.6);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-pill: 50px;
        }

        /* Splash Screen */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #e3f2fd 0%, #bbdefb 35%, #e1f5fe 65%, #f0f7ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }

        #splashScreen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #splashScreen.hidden {
            display: none;
        }

        .splash-logo {
            animation: raceIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
            opacity: 0;
        }

        @keyframes raceIn {
            0% {
                transform: translateX(-100vw) skewX(-20deg) scaleX(1.1);
                opacity: 1;
            }
            50% {
                transform: translateX(60px) skewX(15deg) scaleX(0.95);
                opacity: 1;
            }
            65% {
                transform: translateX(-35px) skewX(-10deg) scaleX(1.02);
            }
            77% {
                transform: translateX(20px) skewX(6deg) scaleX(0.98);
            }
            86% {
                transform: translateX(-10px) skewX(-3deg) scaleX(1.01);
            }
            93% {
                transform: translateX(5px) skewX(1.5deg) scaleX(0.99);
            }
            100% {
                transform: translateX(0) skewX(0deg) scaleX(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes revealUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes revealScale {
            0% { opacity: 0; transform: scale(0.3); }
            50% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes revealBounce {
            0% { opacity: 0; transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes countPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .wrapped-screen {
            padding: 0 !important;
            position: relative;
            overflow: hidden;
        }

        .wrapped-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(200%) blur(50px);
            -webkit-backdrop-filter: saturate(200%) blur(50px);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 40px 24px;
            width: 85%;
            max-width: 340px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.15), inset 0 1px 2px rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .wrapped-emoji {
            font-size: 72px;
            animation: revealBounce 0.6s ease forwards;
            opacity: 0;
        }

        .wrapped-label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 16px 0 8px;
            animation: revealUp 0.5s ease 0.2s forwards;
            opacity: 0;
        }

        .wrapped-value {
            font-size: 64px;
            font-weight: 800;
            color: var(--brand-green);
            animation: revealScale 0.6s ease 0.4s forwards;
            opacity: 0;
        }

        .wrapped-value.name {
            font-size: 42px;
            background: linear-gradient(135deg, #0055aa, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .wrapped-value.name.small {
            font-size: 28px;
        }

        .wrapped-subtitle {
            font-size: 16px;
            color: #888;
            margin-top: 8px;
            animation: revealUp 0.5s ease 0.6s forwards;
            opacity: 0;
        }

        .wrapped-highlight {
            background: var(--brand-green);
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 600;
            margin-top: 16px;
            animation: revealUp 0.5s ease 0.7s forwards;
            opacity: 0;
            box-shadow: 0 4px 12px rgba(0, 115, 229, 0.3);
        }

        html, body {
            width: 100%;
            max-width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #e3f2fd 0%, #bbdefb 35%, #e1f5fe 65%, #f0f7ff 100%);
            background-attachment: fixed;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        #mainApp {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            box-sizing: border-box;
            touch-action: manipulation;
            overscroll-behavior: none;
        }


        .app-header {
            padding: 10px 16px;
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text);
            font-size: 17px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .header-btn:active {
            transform: scale(0.92);
            background: var(--glass-strong);
        }


        .view-tabs {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            padding: 4px 6px;
            margin: 10px 12px 6px 12px;
            background: var(--glass);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            overflow: hidden;
            flex-shrink: 0;
            width: calc(100% - 24px);
            box-sizing: border-box;
            box-shadow: var(--glass-shadow);
            align-items: center;
        }

        .view-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            flex: 1;
            min-width: 38px;
            max-width: 38px;
            height: 38px;
            padding: 0;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 50%;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden;
        }

        .view-tab .tab-emoji {
            font-size: 18px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .view-tab .tab-label {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .view-tab:active {
            transform: scale(0.94);
        }

        .view-tab.active {
            flex: 1.5;
            min-width: auto;
            max-width: none;
            padding: 0 14px;
            gap: 6px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text);
            border-radius: var(--radius-pill);
            box-shadow: var(--shadow-md);
        }

        .view-tab.active .tab-label {
            max-width: 100px;
            opacity: 1;
        }

        .view-tab.active .tab-emoji {
            transform: scale(1.05);
        }

        .app-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: transparent;
            min-height: 0;
            max-height: 100%;
            width: 100%;
            max-width: 100%;
            position: relative;
        }

        .screen {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 6px 12px;
            padding-bottom: 24px;
            min-height: 0;
            max-height: 100%;
            width: 100%;
            max-width: 100%;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            overscroll-behavior: contain;
            box-sizing: border-box;
        }

        .screen.live-screen {
            overflow: hidden;
            padding-bottom: 14px;
        }

        .live-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }


        .screen.chat-screen {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Tabs */
        .day-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--glass);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            padding: 6px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .day-nav button {
            flex: 1;
            padding: 10px 8px;
            background: transparent;
            border: none;
            border-radius: var(--radius-pill);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .day-nav button.active {
            background: var(--glass-strong);
            color: var(--text);
            box-shadow: var(--shadow-md);
        }

        /* Card Stack */
        .card-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-stack {
            position: relative;
            width: 100%;
            height: 380px;
            margin-bottom: 20px;
        }

        .swipe-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            cursor: grab;
            transition: transform 0.3s, opacity 0.3s;
            border: 1.5px solid var(--glass-border);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .swipe-card:active {
            cursor: grabbing;
        }

        .swipe-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .swipe-card.food::before {
            background: var(--accent-4);
        }

        .swipe-card.outdoor::before {
            background: var(--accent-5);
        }

        .swipe-card.social::before {
            background: var(--accent-3);
        }

        .swipe-card.travel::before {
            background: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-emoji {
            font-size: 48px;
        }

        .card-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .card-status.upcoming {
            background: rgba(88, 166, 255, 0.2);
            color: var(--accent);
        }

        .card-status.now {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-5);
            animation: pulse-status 2s infinite;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-time {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .card-location {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .card-people {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            margin-left: -8px;
        }

        .avatar:first-child {
            margin-left: 0;
        }

        .card-trackers {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .card-tracker {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--surface);
            border-radius: 20px;
            font-size: 14px;
        }

        .card-tracker .count {
            font-weight: 600;
            color: var(--accent);
        }

        .swipe-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .swipe-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1.5px solid var(--glass-border);
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--glass-shadow);
        }

        .swipe-btn:active {
            transform: scale(0.92);
            box-shadow: var(--shadow-lg);
        }

        .swipe-btn.skip {
            border-color: var(--accent-4);
            color: var(--accent-4);
        }

        .swipe-btn.checkin {
            border-color: var(--accent-5);
            color: var(--accent-5);
        }

        .swipe-btn.info {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Live Activity View */
        .current-activity {
            background: linear-gradient(145deg, rgba(63, 185, 80, 0.12), rgba(255, 255, 255, 0.6));
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1.5px solid rgba(63, 185, 80, 0.25);
            border-radius: var(--radius-lg);
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: var(--glass-shadow);
        }

        .current-activity .label {
            font-size: 11px;
            color: var(--accent-5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .current-activity .title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tracker-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex: 1;
            margin-bottom: 12px;
        }

        .tracker-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 16px 12px;
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: var(--glass-shadow);
            min-height: 90px;
        }

        .tracker-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-lg);
        }

        .tracker-btn .emoji {
            font-size: 32px;
        }

        .tracker-btn .count {
            font-size: 28px;
            font-weight: 700;
        }

        .tracker-btn .label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .quick-action {
            flex: 1;
            padding: 10px 8px;
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-lg);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: var(--glass-shadow);
        }

        .quick-action.rallii-check {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border-color: rgba(255, 107, 107, 0.5);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.25);
        }

        .quick-action:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-lg);
        }

        .quick-action .icon {
            font-size: 24px;
        }

        .activity-feed {
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 12px;
            box-shadow: var(--glass-shadow);
        }

        .activity-feed h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-dim);
        }

        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .feed-content {
            flex: 1;
        }

        .feed-content .text {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .feed-content .time {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Race View */
        .race-container {
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: var(--glass-shadow);
        }

        .race-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .race-header h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .race-category {
            font-size: 11px;
            padding: 4px 10px;
            background: var(--surface);
            border-radius: 12px;
            color: var(--text-dim);
        }

        .race-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .race-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .race-tab.active {
            background: var(--bg-solid);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        .race-track {
            position: relative;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--glass-border);
        }

        .race-lane {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border);
        }

        .race-lane:last-child {
            border-bottom: none;
        }

        .race-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .race-progress {
            flex: 1;
            height: 28px;
            background: var(--surface-2);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }

        .race-bar {
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            transition: width 0.5s ease-out;
            position: relative;
            min-width: 45px;
        }

        .race-bar::after {
            content: '';
            position: absolute;
            right: 6px;
            font-size: 14px;
        }

        .race-bar.horse::after {
            content: '🏇';
        }

        .race-bar.car::after {
            content: '🏎️';
        }

        .race-bar.rocket::after {
            content: '🚀';
        }

        .race-bar.runner::after {
            content: '🏃';
        }

        .race-bar.beer::after {
            content: '🍺';
        }

        .race-score {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-right: 22px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .race-finish {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-5);
        }

        .race-finish::before {
            content: '🏁';
            position: absolute;
            right: -4px;
            top: -20px;
            font-size: 16px;
        }

        .race-timeframe {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .race-timeframe button {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
        }

        .race-timeframe button.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(9, 105, 218, 0.1);
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: var(--bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 14px;
            font-weight: 600;
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Chat View */
        .chat-view {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        .chat-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px;
            border-radius: var(--radius-md);
            flex-shrink: 0;
        }

        .chat-tabs button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .chat-tabs button.active {
            background: var(--bg-solid);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        .reaction-bar {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--glass-border);
        }

        .reaction-bar button {
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .reaction-bar button:active {
            background: var(--surface-2);
            transform: scale(1.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 12px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
            touch-action: pan-y;
            overscroll-behavior: contain;
        }

        .chat-message {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .chat-message.own {
            flex-direction: row-reverse;
        }

        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-bubble {
            max-width: 75%;
            padding: 12px 16px;
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            border-top-left-radius: 6px;
            box-shadow: var(--shadow-sm);
        }

        .chat-message.own .chat-bubble {
            background: linear-gradient(145deg, rgba(0, 115, 229, 0.85), rgba(0, 90, 180, 0.9));
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: var(--radius-lg);
            border-top-right-radius: 6px;
        }

        .chat-bubble .name {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .chat-message.own .chat-bubble .name {
            color: rgba(255,255,255,0.7);
        }

        .chat-bubble .text {
            font-size: 15px;
            line-height: 1.4;
        }

        .chat-bubble .time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .chat-message.own .chat-bubble .time {
            color: rgba(255,255,255,0.6);
        }

        .chat-bubble .gif {
            width: 100%;
            max-width: 180px;
            border-radius: 10px;
            margin-top: 6px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            font-size: 36px;
        }

        .chat-reactions {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .chat-reaction {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--surface);
            border-radius: 12px;
            font-size: 12px;
        }

        .chat-reaction .count {
            font-size: 11px;
            color: var(--text-dim);
        }

        .message-reactions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .reaction-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .reaction-badge:active {
            transform: scale(0.95);
        }

        .reaction-badge.own {
            background: rgba(0, 115, 229, 0.15);
            border-color: var(--brand-blue);
        }

        .chat-message.own .reaction-badge {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .chat-message.own .reaction-badge.own {
            background: rgba(255,255,255,0.35);
            border-color: rgba(255,255,255,0.5);
        }

        .reaction-picker {
            position: fixed;
            background: var(--bg-solid);
            border-radius: 24px;
            padding: 8px 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            display: flex;
            gap: 4px;
            z-index: 1000;
            animation: popIn 0.15s ease;
        }

        .reaction-picker button {
            background: none;
            border: none;
            font-size: 24px;
            padding: 6px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.1s;
        }

        .reaction-picker button:hover {
            background: var(--surface);
            transform: scale(1.2);
        }

        .reaction-picker button:active {
            transform: scale(0.9);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            margin: 0 -20px -20px;
            background: var(--glass);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
            width: calc(100% + 40px);
            max-width: calc(100% + 40px);
        }

        .chat-input {
            flex: 1;
            min-width: 0;
            padding: 12px 18px;
            background: var(--glass-strong);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-pill);
            color: var(--text);
            font-size: 15px;
            box-shadow: var(--shadow-sm);
        }

        .chat-input::placeholder {
            color: var(--text-dim);
        }

        .chat-send {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, rgba(0, 115, 229, 0.9), rgba(0, 90, 180, 0.95));
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(0, 115, 229, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        .chat-send:active {
            transform: scale(0.92);
            box-shadow: 0 2px 8px rgba(0, 115, 229, 0.4);
        }

        /* Challenges View */
        .challenge-card {
            background: var(--glass-strong);
            backdrop-filter: saturate(200%) blur(40px);
            -webkit-backdrop-filter: saturate(200%) blur(40px);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 12px;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .challenge-card.active {
            border-color: rgba(0, 115, 229, 0.35);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow-lg);
        }

        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .challenge-emoji {
            font-size: 36px;
        }

        .challenge-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(163, 113, 247, 0.2);
            color: var(--accent-3);
        }

        .challenge-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .challenge-desc {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .challenge-progress {
            height: 8px;
            background: var(--surface);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .challenge-progress-bar {
            height: 100%;
            background: var(--brand-green);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .challenge-status {
            font-size: 13px;
            color: var(--text-dim);
        }

        .add-challenge-btn {
            width: 100%;
            max-width: 100%;
            padding: 14px 18px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 115, 229, 0.3);
            box-sizing: border-box;
        }

        .add-challenge-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 115, 229, 0.3);
        }

        .challenge-complete-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .challenge-badge.complete {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-5);
        }

        .challenge-badge.failed {
            background: rgba(207, 34, 46, 0.2);
            color: var(--accent-4);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-solid);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 100%;
            max-width: 340px;
            box-shadow: var(--shadow-lg);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal-cancel {
            flex: 1;
            padding: 14px;
            background: var(--surface);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .modal-confirm {
            flex: 1;
            padding: 16px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 115, 229, 0.3);
        }

        .modal-confirm:active {
            transform: scale(0.98);
        }

        /* Golf Scorecard */
        .golf-scorecard {
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }

        .golf-header {
            background: var(--brand-green);
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .golf-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .golf-table {
            width: 100%;
            overflow-x: auto;
        }

        .golf-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .golf-table th, .golf-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            min-width: 40px;
        }

        .golf-table th {
            background: rgba(0, 0, 0, 0.02);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .golf-table th:first-child,
        .golf-table td:first-child {
            position: sticky;
            left: 0;
            background: var(--bg-solid);
            text-align: left;
            min-width: 80px;
            z-index: 1;
        }

        .golf-table th:first-child {
            background: var(--surface);
            z-index: 2;
        }

        .golf-table input {
            width: 36px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .golf-total {
            font-weight: 700;
            background: rgba(0, 115, 229, 0.15) !important;
            color: var(--brand-green);
        }

        .golf-btn {
            flex: 1;
            padding: 12px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Floating reaction animation */
        .floating-reaction {
            position: fixed;
            font-size: 40px;
            animation: floatUp 2s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.5);
            }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: toastIn 0.3s ease-out;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 50%, #f0f0f2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            z-index: 2000;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-logo {
            margin-bottom: 60px;
        }

        .login-section-title {
            display: none;
        }

        .login-form {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-input {
            padding: 18px 20px;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-size: 17px;
            color: var(--text);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .login-input::placeholder {
            color: var(--text-dim);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 4px rgba(0, 115, 229, 0.15);
        }

        .login-btn {
            padding: 18px;
            background: var(--brand-green);
            border: none;
            border-radius: var(--radius-md);
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 115, 229, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 115, 229, 0.3);
        }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }

        .login-tabs {
            display: flex;
            gap: 0;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            background: var(--surface-2);
            border-radius: 12px;
            padding: 4px;
        }

        .login-tab {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .login-tab.active {
            background: var(--accent);
            color: #fff;
        }

        /* Onboarding Screen */
        .onboarding-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 50%, #f0f0f2 100%);
            display: flex;
            flex-direction: column;
            z-index: 2500;
            overflow: hidden;
        }

        .onboarding-screen.hidden {
            display: none;
        }

        .onboarding-progress {
            display: flex;
            gap: 6px;
            padding: 16px 24px;
            padding-top: calc(env(safe-area-inset-top) + 16px);
        }

        .onboarding-progress-dot {
            flex: 1;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            transition: background 0.3s;
        }

        .onboarding-progress-dot.active {
            background: var(--brand-blue);
        }

        .onboarding-progress-dot.completed {
            background: var(--brand-blue);
        }

        .onboarding-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            overflow-y: auto;
        }

        .onboarding-card {
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }

        .onboarding-emoji {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .onboarding-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .onboarding-subtitle {
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 24px;
            max-width: 300px;
            line-height: 1.5;
        }

        .onboarding-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 340px;
        }

        .onboarding-feature {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            text-align: left;
        }

        .onboarding-feature-icon {
            font-size: 24px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .onboarding-feature-text {
            flex: 1;
        }

        .onboarding-feature-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .onboarding-feature-desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .onboarding-input {
            width: 100%;
            max-width: 300px;
            padding: 18px 20px;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .onboarding-input:focus {
            outline: none;
            border-color: var(--brand-blue);
        }

        .onboarding-avatar-area {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 2px dashed rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }

        .onboarding-avatar-area:hover {
            border-color: var(--brand-blue);
            background: #f8f9ff;
        }

        .onboarding-avatar-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .onboarding-avatar-placeholder {
            font-size: 40px;
            color: #ccc;
        }

        .onboarding-footer {
            padding: 24px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
        }

        .onboarding-btn {
            width: 100%;
            padding: 18px 24px;
            background: var(--brand-blue);
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .onboarding-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .onboarding-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .onboarding-btn-secondary {
            background: transparent;
            color: var(--text-dim);
            margin-top: 12px;
            padding: 12px;
        }

        .onboarding-btn-secondary:active {
            background: rgba(0,0,0,0.05);
        }

        .wrapped-teaser {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius-lg);
            padding: 24px;
            color: #fff;
            max-width: 320px;
            width: 100%;
        }

        .wrapped-teaser-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .wrapped-teaser-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .wrapped-teaser-desc {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .install-instructions {
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            max-width: 320px;
            width: 100%;
            text-align: left;
        }

        .install-step {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .install-step:last-child {
            border-bottom: none;
        }

        .install-step-num {
            width: 24px;
            height: 24px;
            background: var(--brand-blue);
            color: #fff;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .install-step-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.4;
        }

        /* Timeline Schedule */
        .schedule-timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding-bottom: 10px;
        }

        .timeline-item {
            display: flex;
            gap: 8px;
            position: relative;
        }

        .timeline-time {
            width: 44px;
            flex-shrink: 0;
            text-align: right;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .time-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
        }

        .now-badge {
            font-size: 8px;
            font-weight: 700;
            background: var(--brand-green);
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
            animation: pulse-status 2s infinite;
        }

        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--brand-green);
            border: 2px solid var(--surface);
            flex-shrink: 0;
            margin-top: 12px;
            position: relative;
            z-index: 2;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 57px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--brand-green);
            opacity: 0.3;
            z-index: 1;
        }

        .timeline-item:first-child::before {
            top: 16px;
        }

        .timeline-item:last-child::before {
            bottom: calc(100% - 16px);
        }

        .timeline-item.now .timeline-dot {
            background: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(0, 115, 229, 0.4);
        }

        .timeline-card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin: 4px 0;
            border-left: 3px solid var(--brand-green);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            border: 1px solid var(--glass-border);
            border-left: 3px solid var(--brand-green);
        }

        .timeline-item.now .timeline-card {
            background: rgba(0, 115, 229, 0.12);
            border-left-color: var(--brand-green);
            box-shadow: 0 2px 8px rgba(0, 115, 229, 0.15);
        }

        .timeline-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .timeline-emoji {
            font-size: 20px;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 600;
        }

        .timeline-details {
            display: flex;
            flex-direction: row;
            gap: 12px;
            flex-wrap: wrap;
        }

        .timeline-duration {
            font-size: 11px;
            color: var(--brand-green);
            font-weight: 500;
        }

        .timeline-location {
            font-size: 11px;
            color: var(--text-dim);
        }

        .timeline-note {
            margin-top: 6px;
            font-size: 11px;
            color: var(--brand-green);
            font-style: italic;
            padding-top: 6px;
            border-top: 1px dashed var(--border);
        }

        /* Coverflow Photo Gallery */
        .photos-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0 !important;
            overflow: hidden;
        }

        .coverflow-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            overflow: hidden;
            padding: 10px 0;
        }

        .coverflow-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coverflow-track {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .coverflow-slide {
            position: absolute;
            width: 280px;
            height: 360px;
            left: 50%;
            top: 50%;
            margin-left: -140px;
            margin-top: -180px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--glass-strong);
            border: none;
            box-shadow: var(--shadow-lg);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .coverflow-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s ease;
        }

        .coverflow-slide.active {
            z-index: 10;
            transform: translateZ(120px) scale(1.05);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        .coverflow-slide.active img {
            filter: blur(0);
        }

        .coverflow-slide.prev-1 {
            z-index: 5;
            transform: translateX(-35%) translateZ(-50px) rotateY(55deg) scale(0.8);
            opacity: 0.9;
        }

        .coverflow-slide.prev-1 img {
            filter: blur(1.5px);
        }

        .coverflow-slide.prev-2 {
            z-index: 4;
            transform: translateX(-55%) translateZ(-120px) rotateY(60deg) scale(0.7);
            opacity: 0.6;
        }

        .coverflow-slide.prev-2 img {
            filter: blur(3px);
        }

        .coverflow-slide.prev-3 {
            z-index: 3;
            transform: translateX(-70%) translateZ(-180px) rotateY(65deg) scale(0.6);
            opacity: 0.35;
        }

        .coverflow-slide.prev-3 img {
            filter: blur(4px);
        }

        .coverflow-slide.next-1 {
            z-index: 5;
            transform: translateX(35%) translateZ(-50px) rotateY(-55deg) scale(0.8);
            opacity: 0.9;
        }

        .coverflow-slide.next-1 img {
            filter: blur(1.5px);
        }

        .coverflow-slide.next-2 {
            z-index: 4;
            transform: translateX(55%) translateZ(-120px) rotateY(-60deg) scale(0.7);
            opacity: 0.6;
        }

        .coverflow-slide.next-2 img {
            filter: blur(3px);
        }

        .coverflow-slide.next-3 {
            z-index: 3;
            transform: translateX(70%) translateZ(-180px) rotateY(-65deg) scale(0.6);
            opacity: 0.35;
        }

        .coverflow-slide.next-3 img {
            filter: blur(4px);
        }

        .coverflow-slide.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Fullscreen photo view */
        .photo-fullscreen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .photo-fullscreen img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .photo-fullscreen-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .coverflow-caption {
            text-align: center;
            padding: 12px;
        }

        .coverflow-caption h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .coverflow-caption p {
            font-size: 13px;
            color: var(--text-dim);
        }

        .coverflow-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            padding: 10px;
        }

        .coverflow-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .coverflow-dot.active {
            width: 24px;
            border-radius: 4px;
            background: var(--brand-green);
        }

        .coverflow-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 0 16px 16px;
            padding: 12px 20px;
            background: var(--glass-strong);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-pill);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }

        .coverflow-add-btn:active {
            transform: scale(0.97);
        }

        .coverflow-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            padding: 40px;
            text-align: center;
        }

        .coverflow-empty-icon {
            font-size: 64px;
            opacity: 0.5;
        }

        .coverflow-empty h3 {
            font-size: 20px;
            font-weight: 600;
        }

        .coverflow-empty p {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* Morning Brief Styles */
        .brief-header {
            text-align: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--brand-blue), #0055cc);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }

        .brief-header .greeting {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 0;
            color: #fff;
        }

        .brief-header .subtext {
            font-size: 14px;
            color: var(--text-dim);
        }

        .brief-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .brief-section h3 {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.2), rgba(100, 149, 237, 0.1));
            border-radius: var(--radius-sm);
            border: 1px solid rgba(135, 206, 235, 0.3);
        }

        .weather-loading {
            color: var(--text-dim);
            font-size: 14px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather-icon {
            font-size: 40px;
        }

        .weather-temp {
            font-size: 32px;
            font-weight: 700;
        }

        .weather-details {
            flex: 1;
        }

        .weather-desc {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .weather-range {
            font-size: 13px;
            color: var(--text-dim);
        }

        .mvp-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 193, 7, 0.05));
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .mvp-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            position: relative;
        }

        .mvp-crown {
            position: absolute;
            top: -12px;
            font-size: 20px;
        }

        .mvp-info { flex: 1; }

        .mvp-name {
            font-size: 20px;
            font-weight: 700;
        }

        .mvp-stat {
            font-size: 13px;
            color: var(--gold);
        }

        .standings-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .standing-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
        }

        .standing-position {
            width: 24px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .standing-position.gold { color: #FFD700; }
        .standing-position.silver { color: #C0C0C0; }
        .standing-position.bronze { color: #CD7F32; }

        .standing-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .standing-name { flex: 1; font-weight: 500; }

        .standing-score {
            font-weight: 600;
            color: var(--accent);
        }

        .money-watch {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.1), var(--surface));
            border-radius: var(--radius-sm);
        }

        .money-emoji { font-size: 32px; }
        .money-info { flex: 1; }
        .money-name { font-weight: 600; }

        .money-amount {
            font-size: 13px;
            color: var(--accent-4);
        }

        .drama-stat {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(175, 82, 222, 0.1), var(--surface));
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--accent-3);
        }

        .drama-emoji { font-size: 28px; }

        .drama-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
        }

        .drama-text strong { color: var(--accent-3); }

        .schedule-preview {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schedule-preview-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
        }

        .schedule-preview-item.next {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), var(--surface));
            border: 1px solid rgba(0, 122, 255, 0.2);
        }

        .schedule-preview-emoji { font-size: 24px; }
        .schedule-preview-info { flex: 1; }
        .schedule-preview-title { font-weight: 500; }

        .schedule-preview-time {
            font-size: 12px;
            color: var(--accent);
        }

        /* RALLII Check Styles */
        .rallii-check-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: var(--radius-md);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            transition: all 0.2s;
        }

        .rallii-check-btn:active {
            transform: scale(0.98);
        }

        .rallii-check-btn .icon { font-size: 24px; }

        // Initialize Firebase data structure for trip
        async function initializeFirebaseTrip() {
            if (!db || firebaseInitialized) return;

            try {
                const snapshot = await db.ref(`trips/${TRIP_ID}`).once('value');
                if (!snapshot.exists()) {

        // Set up real-time listeners
        function setupFirebaseListeners() {
            if (!db || firebaseListenersActive) return;

            const tripRef = db.ref(`trips/${TRIP_ID}`);

            // Listen for participant changes
            tripRef.child('participants').on('value', (snapshot) => {
                const data = snapshot.val();
                state.participants = data ? Object.values(data) : [];
                if (state.view) renderView();
            });

            // Listen for tracker count changes
            tripRef.child('trackerCounts').on('value', (snapshot) => {
                const data = snapshot.val();
                state.trackerCounts = data || { drinks: {}, clubs: {}, birdies: {}, holeinone: {} };
                if (state.view) {
                    trackers.forEach(t => {
                        const countEl = document.getElementById(`tracker-count-${t.id}`);
                        if (countEl) countEl.textContent = getTrackerCount(t.id);
                    });
                    updateLeaderDisplay();
                }
            }, (error) => {
                console.error('Firebase trackerCounts error:', error);
            });

            // Listen for activity/schedule changes
            tripRef.child('activities').on('value', (snapshot) => {
                const data = snapshot.val();
                state.activities = data ? Object.values(data) : [];
                if (state.view === 'schedule' || state.view === 'brief') renderView();
            });

            // Listen for expense changes
            tripRef.child('expenses').on('value', (snapshot) => {
                const data = snapshot.val();
                state.expenses = data ? Object.values(data) : [];
                if (state.view === 'split') renderView();
            });

            // Listen for photo changes
            tripRef.child('photos').on('value', (snapshot) => {
                const data = snapshot.val();
                state.photos = data ? Object.values(data) : [];
                if (state.view === 'live') renderView();
            });

            // Listen for RALLII check changes
            tripRef.child('ralliiChecks').on('value', (snapshot) => {
                const data = snapshot.val();
                const oldChecks = state.ralliiChecks || [];
                state.ralliiChecks = data ? Object.values(data) : [];

                // Check for new active checks that we haven't seen
                const activeCheck = getActiveCheck();
                if (activeCheck && !state.seenCheckIds?.includes(activeCheck.id)) {
                    // Don't show popup to the person who started it
                    if (activeCheck.startedBy !== state.myName) {
                        showRalliiCheckPopup(activeCheck);
                    }
                }

                if (state.view === 'live') renderView();
            });

            // Listen for chat messages
            tripRef.child('messages').on('value', (snapshot) => {
                const data = snapshot.val();
                state.messages = data ? Object.values(data).map(m => ({
                    ...m,
                    own: m.name === state.myName
                })) : [];
                if (state.view === 'chat') renderView();

            // Listen for now playing

        // Get most played song from history
        function getMostPlayedSong() {
            if (!state.songHistory || state.songHistory.length === 0) return null;

            const songCounts = {};
            state.songHistory.forEach(song => {
                const key = song.songKey || `${song.title}-${song.artist}`;
                if (!songCounts[key]) {
                    songCounts[key] = { title: song.title, artist: song.artist, count: 0 };
                }
                songCounts[key].count++;
            });

            const sorted = Object.values(songCounts).sort((a, b) => b.count - a.count);
            return sorted[0] || null;
        }
